<script>
// ── Web Audio API sound engine ────────────────────────────────────────────
window.ScratchCarAudio = (function () {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function noise(duration, vol) {
    const c = getCtx();
    const len = c.sampleRate * duration;
    const buf = c.createBuffer(1, len, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (len * 0.4));
    const src = c.createBufferSource();
    src.buffer = buf;
    const g = c.createGain(); g.gain.value = vol;
    src.connect(g); g.connect(c.destination); src.start();
  }

  function tone(freq, type, dur, vol, delay) {
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime + delay);
    o.stop(c.currentTime + delay + dur + 0.05);
  }

  return {
    scratch: function () { try { noise(0.07, 0.12); } catch(e){} },

    reveal: function () {
      try {
        [523, 659, 784, 1047, 1319, 1568].forEach(function(f, i) { tone(f, 'sine', 0.25, 0.28, i * 0.075); });
      } catch(e) {}
    },

    horn: function () {
      try {
        tone(349, 'sawtooth', 0.18, 0.25, 0);
        tone(349, 'sawtooth', 0.18, 0.25, 0.28);
      } catch(e) {}
    },

    lights: function () {
      try {
        [0, 0.1, 0.2].forEach(function(d) { tone(1200, 'square', 0.06, 0.15, d); });
      } catch(e) {}
    },

    wash: function () {
      try {
        noise(1.2, 0.18);
        tone(880, 'sine', 0.2, 0.12, 0.1);
      } catch(e) {}
    },

    party: function () {
      try {
        [523, 659, 784, 1047].forEach(function(f, i) { tone(f, 'triangle', 0.35, 0.22, i * 0.05); });
        noise(0.4, 0.1);
      } catch(e) {}
    },

    spin: function () {
      try {
        const c = getCtx();
        const o = c.createOscillator(); const g = c.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(200, c.currentTime);
        o.frequency.linearRampToValueAtTime(600, c.currentTime + 0.5);
        o.frequency.linearRampToValueAtTime(200, c.currentTime + 1.0);
        g.gain.setValueAtTime(0.2, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 1.05);
        o.connect(g); g.connect(c.destination);
        o.start(); o.stop(c.currentTime + 1.1);
      } catch(e) {}
    },

    color: function () {
      try {
        [523, 587, 659, 698, 784, 880, 988, 1047].forEach(function(f, i) { tone(f, 'sine', 0.18, 0.2, i * 0.04); });
      } catch(e) {}
    },

    start: function() {
      try {
        [330, 392, 523].forEach(function(f, i) { tone(f, 'triangle', 0.3, 0.2, i * 0.1); });
      } catch(e) {}
    }
  };
})();
</script>
